<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Monitor Setup</title>
    <style>
        :root {
            --bg-dark: #121418;
            --bg-card: #1e2126;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: #334155;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-dark); color: var(--text-main); text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { margin-bottom: 8px; font-weight: 600; font-size: 2.2em; letter-spacing: -0.5px; }
        p { margin-top: 0; margin-bottom: 40px; color: var(--text-muted); font-size: 1.1em; }
        .container { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 240px; text-decoration: none; color: var(--text-main); transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .card h2 { margin: 0 0 8px 0; font-size: 1.5em; font-weight: 500; }
        .card span { color: var(--text-muted); font-size: 0.95em; }
    </style>
</head>
<body>

    <h1>Motion Monitor</h1>
    <p>Select the role for this device</p>

    <div class="container">
        <a href="broadcaster.html" class="card">
            <h2>Broadcaster</h2>
            <span>Act as the Camera</span>
        </a>

        <a href="viewer.html" class="card">
            <h2>Viewer</h2>
            <span>Act as the Monitor</span>
        </a>
    </div>

</body>
</html>
