<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glimpse Broadcaster</title>
    <script src="https://unpkg.com/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #121418; --header: #1e2126; --text: #f1f5f9; --muted: #94a3b8;
            --accent: #3b82f6; --accent-hover: #2563eb;
            --green: #10b981; --warning: #f59e0b; --border: #334155;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: var(--header); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .brand { font-weight: 600; font-size: 1.2em; }
        .status { position: absolute; left: 50%; transform: translateX(-50%); font-size: 0.95em; color: var(--warning); white-space: nowrap; }
        .status-connected { color: var(--green); }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; overflow: hidden; }

        video { width: 45%; max-width: 350px; border-radius: 10px; background: #000; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

        .btn-ring { background: var(--accent); color: white; padding: 20px 20px; font-size: 1.8em; border: none; border-radius: 12px; width: 90%; max-width: 500px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-ring:hover:not(:disabled):not(.unavailable) { background: var(--accent-hover); transform: translateY(-3px); }
        .btn-ring:disabled, .btn-ring.unavailable { background: #334155; color: var(--muted); cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <header>
        <div class="brand">Glimpse</div>
        <div id="status" class="status">Initializing</div>
        <div></div>
    </header>
    <main>
        <video id="local-video" autoplay playsinline muted></video>
        <button id="ring-btn" class="btn-ring" onclick="sendRing()" disabled>Ring Viewer</button>
    </main>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const statusEl = document.getElementById('status');
            if(statusEl) {
                statusEl.innerText = "System Crash: " + msg;
                statusEl.style.color = "#ef4444";
            }
            return false;
        };

        const TARGET_ID = window.location.hash.substring(1);
        if (window.location.hash) window.history.replaceState(null, null, window.location.pathname);

        const statusEl = document.getElementById('status');
        const ringBtn = document.getElementById('ring-btn');
        let dataConn = null;
        let isAvail = true;
        let localStream = null;
        let isRetrying = false;

        const peer = new Peer();

        if (!TARGET_ID) {
            statusEl.innerText = "Missing ID. Scan QR code on Glimpse Monitor";
            statusEl.style.color = "#ef4444";
        } else {
            const constraints = { video: { facingMode: "environment" }, audio: false };

            const handleSuccess = function(stream) {
                localStream = stream;
                const videoEl = document.getElementById('local-video');
                videoEl.srcObject = stream;
                videoEl.play().catch(e => console.log("Auto-play prevented:", e));
                attemptConnect();
            };

            const handleError = function(err) {
                statusEl.innerText = "Camera Error: " + (err.name || "Access Denied");
                statusEl.style.color = "#ef4444";
                console.error(err);
            };

            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia(constraints)
                    .then(handleSuccess)
                    .catch(handleError);
            } else {
                const legacyGetUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia;

                if (legacyGetUserMedia) {
                    legacyGetUserMedia.call(navigator, constraints, handleSuccess, handleError);
                } else {
                    statusEl.innerText = "Camera API not supported on this browser";
                    statusEl.style.color = "#ef4444";
                }
            }
        }

        peer.on('error', err => {
            if (err.type === 'peer-unavailable') {
                handleDrop();
            }
        });

        const handleDrop = () => {
            if (isRetrying) return;
            isRetrying = true;

            statusEl.innerText = "Glimpse Monitor Disconnected - Retrying...";
            statusEl.className = "status";
            ringBtn.disabled = true;

            if (dataConn) {
                dataConn.close();
                dataConn = null;
            }

            setTimeout(() => {
                isRetrying = false;
                attemptConnect();
            }, 3000);
        };

        function attemptConnect() {
            if (isRetrying || !localStream) return;

            statusEl.innerText = "Finding Glimpse Monitor...";
            statusEl.className = "status";

            const call = peer.call(TARGET_ID, localStream);
            dataConn = peer.connect(TARGET_ID);

            dataConn.on('open', () => {
                statusEl.innerText = "Connected";
                statusEl.className = "status status-connected";
                ringBtn.disabled = false;
            });

            dataConn.on('data', data => {
                if (data === 'set-unavailable') {
                    isAvail = false;
                    ringBtn.classList.add('unavailable');
                    ringBtn.innerText = "Viewer Unavailable";
                } else if (data === 'set-available') {
                    isAvail = true;
                    ringBtn.classList.remove('unavailable');
                    ringBtn.innerText = "Ring Viewer";
                }
            });

            call.peerConnection.addEventListener('iceconnectionstatechange', () => {
                if (call.peerConnection.iceConnectionState === 'disconnected' || 
                    call.peerConnection.iceConnectionState === 'failed') {
                    handleDrop();
                }
            });

            dataConn.on('close', handleDrop);
            dataConn.on('error', handleDrop);
            call.on('close', handleDrop);
            call.on('error', handleDrop);
        }

        function sendRing() {
            if (dataConn && dataConn.open && isAvail) {
                dataConn.send('manual-alert');
                ringBtn.innerText = "Ringing...";
                setTimeout(() => ringBtn.innerText = "Ring Viewer", 2000);
            }
        }
    </script>
</body>
</html>
