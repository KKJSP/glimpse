<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glimpse Broadcaster</title>

    <link rel="icon" type="image/png" href="icons/favicon192.png">
    <link rel="apple-touch-icon" href="icons/favicon192.png">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Glimpse Cam">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121418">

    <script src="https://unpkg.com/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #121418; --header: #1e2126; --text: #f1f5f9; --muted: #94a3b8;
            --accent: #7973f0; --accent-hover: #635fc8;
            --green: #10b981; --warning: #f59e0b; --border: #334155;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            background: var(--header); border-bottom: 1px solid var(--border);
            height: 65px; display: flex; justify-content: center; align-items: center;
            position: relative; box-sizing: border-box; flex-shrink: 0; z-index: 10;
        }
        @supports (padding-top: env(safe-area-inset-top)) {
            header { height: calc(65px + env(safe-area-inset-top)); padding-top: env(safe-area-inset-top); }
        }

        .brand { font-weight: 600; font-size: 1.2em; letter-spacing: -1px;}

        .header-controls { position: absolute; right: 15px; display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 50%; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .muted-icon { color: #ef4444 !important; }

        .status-banner {
            position: absolute; top: 65px; left: 0; width: 100%; background: #ef4444; color: white;
            text-align: center; padding: 10px; font-size: 0.9em; font-weight: 500;
            transform: translateY(-100%); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; z-index: 5; box-sizing: border-box;
        }
        .status-banner.show { transform: translateY(0); opacity: 1; }
        .status-banner.info { background: var(--border); color: var(--text); }
        @supports (padding-top: env(safe-area-inset-top)) {
            .status-banner { top: calc(65px + env(safe-area-inset-top)); }
        }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; box-sizing: border-box; z-index: 1;}

        .video-wrapper {
            position: relative; background: #0a0c10; border: 1px solid #2a3140; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 3px; display: inline-flex; box-sizing: border-box; margin-bottom: 20px; width: 45%; max-width: 350px;
        }
        video { width: 100%; border-radius: 5px; background: #000; max-height: 60dvh; display: block; object-fit: cover;}

        .btn-ring { background: var(--accent); color: white; padding: 20px 20px; font-size: 1.8em; border: none; border-radius: 12px; width: 90%; max-width: 500px; cursor: pointer; font-weight: 600; transition: 0.2s; margin-bottom: 20px; flex-shrink: 0;}
        .btn-ring:hover:not(:disabled):not(.unavailable) { background: var(--accent-hover); transform: translateY(-3px); }
        .btn-ring:disabled, .btn-ring.unavailable { background: #334155; color: var(--muted); cursor: not-allowed; transform: none; }

        @media (max-height: 500px) {
            main { padding: 10px; }
            .video-wrapper { margin-bottom: 10px; width: auto; max-height: 50dvh; }
            video { width: auto; max-height: calc(50dvh - 6px); }
            .btn-ring { padding: 12px; font-size: 1.3em; margin-bottom: 5px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">Glimpse</div>
        <div class="header-controls">
            <button id="mute-btn" class="icon-btn muted-icon" onclick="toggleMute()" title="Toggle Microphone">
                <svg viewBox="0 0 24 24"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02 3.28c-.91.73-2.05 1.22-3.28 1.22-2.76 0-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.58c3.39-.49 6-3.39 6-6.92h-1.7c0 1.23-.49 2.37-1.22 3.28zM4.27 3L3 4.27l6 6V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.58c2.11-.3 3.96-1.39 5.22-2.95l2.51 2.51 1.27-1.27L4.27 3zM12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
            </button>
        </div>
    </header>
    <div id="status-banner" class="status-banner info">Connecting...</div>

    <main>
        <div class="video-wrapper">
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <button id="ring-btn" class="btn-ring" onclick="sendRing()" disabled>Ring Viewer</button>
    </main>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            setPersistentStatus("System Crash: " + msg, false);
            return false;
        };

        const TARGET_ID = window.location.hash.substring(1);
        if (window.location.hash) window.history.replaceState(null, null, window.location.pathname);

        const ringBtn = document.getElementById('ring-btn');

        let dataConn = null, currentCall = null, isAvail = true, localStream = null;
        let isRetrying = false, retryCount = 0, retryTimer = null;
        const MAX_RETRIES = 10;
        let isPeerOpen = false;
        let hasAudio = false;

        let persistentStatus = "Connecting...";
        let tempTimer = null;

        function setPersistentStatus(msg, isInfo = true) {
            persistentStatus = msg;
            if (!tempTimer) {
                const banner = document.getElementById('status-banner');
                if (isInfo) banner.classList.add('info'); else banner.classList.remove('info');

                if (msg) {
                    banner.innerText = msg;
                    banner.classList.add('show');
                } else {
                    banner.classList.remove('show');
                }
            }
        }

        function showNotification(msg, duration = 0, isInfo = false) {
            const banner = document.getElementById('status-banner');
            banner.innerText = msg;
            if (isInfo) banner.classList.add('info'); else banner.classList.remove('info');
            banner.classList.add('show');

            if (tempTimer) clearTimeout(tempTimer);
            if (duration > 0) {
                tempTimer = setTimeout(() => {
                    tempTimer = null;
                    if (persistentStatus) {
                        banner.innerText = persistentStatus;
                        if (persistentStatus.includes('Error') || persistentStatus.includes('Failed')) {
                            banner.classList.remove('info');
                        } else {
                            banner.classList.add('info');
                        }
                    } else {
                        banner.classList.remove('show');
                    }
                }, duration);
            } else {
                tempTimer = null;
                if (!msg) banner.classList.remove('show');
            }
        }

        function updateMuteIcon() {
            const btn = document.getElementById('mute-btn');
            const isMuted = !hasAudio || !localStream.getAudioTracks()[0].enabled;
            if (isMuted) {
                btn.classList.add('muted-icon');
                btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02 3.28c-.91.73-2.05 1.22-3.28 1.22-2.76 0-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.58c3.39-.49 6-3.39 6-6.92h-1.7c0 1.23-.49 2.37-1.22 3.28zM4.27 3L3 4.27l6 6V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.58c2.11-.3 3.96-1.39 5.22-2.95l2.51 2.51 1.27-1.27L4.27 3zM12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>`;
            } else {
                btn.classList.remove('muted-icon');
                btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.58c3.39-.49 6-3.39 6-6.92h-1.7z"/></svg>`;
            }
        }

        function toggleMute() {
            if (hasAudio) {
                const track = localStream.getAudioTracks()[0];
                track.enabled = !track.enabled;
                updateMuteIcon();
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        const audioTrack = stream.getAudioTracks()[0];
                        localStream.addTrack(audioTrack);
                        hasAudio = true;
                        updateMuteIcon();

                        if (currentCall) currentCall.close();
                        attemptConnect();
                    })
                    .catch(err => {
                        showNotification("Microphone permissions not granted", 2000, false);
                    });
            }
        }

        const peerOpts = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };
        const peer = new Peer(peerOpts);

        if (!TARGET_ID) {
            setPersistentStatus("The Missing Id. Scan QR code on Monitor", false);
        } else {
            const handleSuccess = function(stream, requestedAudio) {
                localStream = stream;
                hasAudio = requestedAudio && stream.getAudioTracks().length > 0;
                updateMuteIcon();

                const videoEl = document.getElementById('local-video');
                videoEl.srcObject = stream;
                videoEl.play().catch(e => console.log("Auto-play prevented:", e));

                if(isPeerOpen && !isRetrying) attemptConnect();
            };

            const initCamera = (requestAudio) => {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: requestAudio })
                    .then(stream => handleSuccess(stream, requestAudio))
                    .catch(err => {
                        if (requestAudio) {
                            console.warn("Audio failed, trying video only");
                            initCamera(false);
                        } else {
                            setPersistentStatus("Camera Access Blocked", false);
                            ringBtn.disabled = false;
                            ringBtn.innerText = "Enable Camera";
                            ringBtn.classList.remove('unavailable');
                            ringBtn.onclick = () => {
                                ringBtn.disabled = true;
                                ringBtn.innerText = "Requesting...";
                                initCamera(true);
                                ringBtn.onclick = sendRing;
                            };
                        }
                    });
            };

            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                initCamera(true);
            } else {
                setPersistentStatus("Camera API not supported", false);
            }
        }

        peer.on('open', () => {
            isPeerOpen = true;
            if(localStream && !isRetrying) attemptConnect();
        });

        peer.on('error', err => { if (err.type === 'peer-unavailable') handleDrop(); });

        const handleDrop = () => {
            if (isRetrying) return;
            isRetrying = true;

            if (dataConn) { dataConn.close(); dataConn = null; }
            if (currentCall) { currentCall.close(); currentCall = null; }

            ringBtn.disabled = true;

            if (retryCount >= MAX_RETRIES) {
                setPersistentStatus("Connection Failed. Refresh.", false);
                return;
            }

            retryCount++;
            setPersistentStatus(`Retrying (${retryCount}/${MAX_RETRIES})...`, true);

            if (retryTimer) clearTimeout(retryTimer);
            retryTimer = setTimeout(() => { isRetrying = false; attemptConnect(); }, 3000);
        };

        function attemptConnect() {
            if (isRetrying || !localStream || !isPeerOpen || peer.destroyed) return;
            if (peer.disconnected) peer.reconnect();

            if (retryCount === 0) setPersistentStatus("Finding Monitor...", true);

            currentCall = peer.call(TARGET_ID, localStream);
            dataConn = peer.connect(TARGET_ID);

            if (dataConn) {
                dataConn.on('open', () => {
                    retryCount = 0;
                    setPersistentStatus("");
                    ringBtn.disabled = false;
                    ringBtn.innerText = isAvail ? "Ring Viewer" : "Viewer Unavailable";
                });
                dataConn.on('data', data => {
                    if (data === 'set-unavailable') {
                        isAvail = false; ringBtn.classList.add('unavailable'); ringBtn.innerText = "Viewer Unavailable";
                    } else if (data === 'set-available') {
                        isAvail = true; ringBtn.classList.remove('unavailable'); ringBtn.innerText = "Ring Viewer";
                    }
                });
                dataConn.on('close', handleDrop);
                dataConn.on('error', handleDrop);
            }

            if (currentCall) {
                if (currentCall.peerConnection) {
                    var pc = currentCall.peerConnection;
                    pc.addEventListener('iceconnectionstatechange', () => {
                        if (pc && (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed')) handleDrop();
                    });
                }
                currentCall.on('close', handleDrop);
                currentCall.on('error', handleDrop);
            }
        }

        function sendRing() {
            if (dataConn && dataConn.open && isAvail) {
                dataConn.send('manual-alert');
                ringBtn.innerText = "Ringing...";
                setTimeout(() => ringBtn.innerText = "Ring Viewer", 2000);
            }
        }
    </script>
</body>
</html>
